name: Windows Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebengine
          cache: true

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DWINDOWN_USE_WEBVIEW2=OFF
          -G "Visual Studio 17 2022"
          -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path deploy
          Copy-Item build\Release\WinDown3000.exe deploy\
          & windeployqt deploy\WinDown3000.exe --release --no-translations --no-opengl-sw --no-system-d3d-compiler
          # Create a zip for release
          Compress-Archive -Path deploy\* -DestinationPath WinDown3000-Windows-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDown3000-Windows-x64
          path: deploy/

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDown3000-Windows-x64-zip
          path: WinDown3000-Windows-x64.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WinDown3000-Windows-x64-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WinDown 3000 ${{ github.ref_name }}"
          files: WinDown3000-Windows-x64.zip
          generate_release_notes: true
          body: |
            ## WinDown 3000 ${{ github.ref_name }}

            A fast, lightweight Markdown editor for Windows.

            ### Download

            Download **WinDown3000-Windows-x64.zip**, extract, and run `WinDown3000.exe`. No installer needed.

            ### Requirements
            - Windows 10 or later (x64)
