name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'resources/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows-build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebengine
          cache: true

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DWINDOWN_USE_WEBVIEW2=OFF
          -G "Visual Studio 17 2022"
          -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Deploy Qt dependencies
        run: |
          mkdir deploy
          copy build\${{ matrix.build_type }}\WinDown3000.exe deploy\
          windeployqt deploy\WinDown3000.exe --release --no-translations --no-opengl-sw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDown3000-${{ matrix.arch }}
          path: deploy/

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WinDown3000-x64
          path: WinDown3000-x64

      - name: Zip release
        run: cd WinDown3000-x64 && zip -r ../WinDown3000-x64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: WinDown3000-x64.zip
          generate_release_notes: true
